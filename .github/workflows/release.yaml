name: Release

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_EDIT_VERSION: "0.13.13"
  CARGO_PACKAGER_VERSION: "0.11.8"

jobs:
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.version.outputs.should-release }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      source-sha: ${{ steps.source.outputs.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Read latest release state
        id: release-state
        uses: actions/github-script@v9
        with:
          script: |
            let latest = null;
            try {
              latest = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            let latestTag = "";
            let aheadBy = 0;
            const main = await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: "main",
            });
            const mainSha = main.data.commit.sha;
            if (latest) {
              latestTag = latest.data.tag_name;
              const comparison = await github.rest.repos.compareCommitsWithBasehead({
                owner: context.repo.owner,
                repo: context.repo.repo,
                basehead: `${latestTag}...${mainSha}`,
              });
              aheadBy = comparison.data.ahead_by;
            }

            core.setOutput("latest-tag", latestTag);
            core.setOutput("ahead-by", String(aheadBy));
            core.setOutput("main-sha", mainSha);

      - name: Choose release eligibility and version
        id: version
        env:
          SAYMORE_LATEST_TAG: ${{ steps.release-state.outputs.latest-tag }}
          SAYMORE_AHEAD_BY: ${{ steps.release-state.outputs.ahead-by }}
        run: cargo run -p xtask -- release-plan --github-output "$GITHUB_OUTPUT"

      - name: Resolve release source
        id: source
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
          MAIN_SHA: ${{ steps.release-state.outputs.main-sha }}
        run: |
          set -euo pipefail
          if git rev-parse --verify --quiet "refs/tags/$TAG"; then
            sha=$(git rev-list --max-count=1 "$TAG")
          else
            sha="$MAIN_SHA"
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Require successful CI for release source
        uses: actions/github-script@v9
        env:
          SOURCE_SHA: ${{ steps.source.outputs.sha }}
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "ci.yaml",
              branch: "main",
              event: "push",
              status: "completed",
              head_sha: process.env.SOURCE_SHA,
              per_page: 10,
            });
            const successful = data.workflow_runs.some(
              (run) => run.head_sha === process.env.SOURCE_SHA && run.conclusion === "success",
            );
            if (!successful) {
              core.setFailed(`CI has not passed for release source ${process.env.SOURCE_SHA}`);
            }

  package-macos:
    name: Package macOS universal DMG
    needs: plan
    if: needs.plan.outputs.should-release == 'true'
    runs-on: macos-14
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.plan.outputs.source-sha }}

      - name: Choose macOS signing mode
        id: apple-auth
        shell: bash
        run: |
          set -euo pipefail
          complete=true
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [[ -z "${!name:-}" ]]; then
              complete=false
            fi
          done
          echo "signed=$complete" >> "$GITHUB_OUTPUT"
          if [[ "$complete" != true ]]; then
            sed -i '' '/^signing-identity = /d' apps/desktop/Cargo.toml
            echo "::warning::Apple credentials are incomplete; publishing an unsigned, unnotarized DMG."
          fi

      - name: Setup Rust targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install release tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit@${{ env.CARGO_EDIT_VERSION }},cargo-packager@${{ env.CARGO_PACKAGER_VERSION }}

      - name: Set release version
        run: cargo set-version --workspace "${{ needs.plan.outputs.version }}"

      - name: Build both macOS architectures
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p saymore-desktop --release --target aarch64-apple-darwin
          cargo build -p saymore-desktop --release --target x86_64-apple-darwin
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            target/aarch64-apple-darwin/release/saymore-desktop \
            target/x86_64-apple-darwin/release/saymore-desktop \
            -output target/universal-apple-darwin/release/saymore-desktop

      - name: Package DMG
        env:
          # cargo-packager skips Finder layout customization when CI=true.
          CI: "false"
        run: >-
          cargo packager --release --packages saymore-desktop --formats dmg
          --target universal-apple-darwin --out-dir dist

      - name: Verify DMG presentation
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmgs=(apps/desktop/dist/*.dmg)
          if [[ ${#dmgs[@]} -ne 1 ]]; then
            echo "expected exactly one DMG, found ${#dmgs[@]}" >&2
            exit 1
          fi

          mount_dir="$(mktemp -d)"
          cleanup() {
            hdiutil detach "$mount_dir" -quiet || true
            rmdir "$mount_dir" || true
          }
          trap cleanup EXIT

          # Attaching without accepting input verifies that the DMG has no EULA prompt.
          hdiutil attach "${dmgs[0]}" -nobrowse -readonly -mountpoint "$mount_dir" </dev/null
          test -d "$mount_dir/Saymore.app"
          test -L "$mount_dir/Applications"
          test -f "$mount_dir/.background/dmg-background.png"
          test -s "$mount_dir/.DS_Store"
          strings "$mount_dir/.DS_Store" | grep -Fq "dmg-background.png"

      - name: Mark unsigned DMG
        if: steps.apple-auth.outputs.signed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          for file in apps/desktop/dist/*.dmg; do
            mv "$file" "${file%.dmg}-unsigned.dmg"
          done

      - uses: actions/upload-artifact@v7
        with:
          name: release-macos
          path: apps/desktop/dist/*.dmg
          if-no-files-found: error

  package-windows:
    name: Package Windows NSIS installer
    needs: plan
    if: needs.plan.outputs.should-release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.plan.outputs.source-sha }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        run: choco install nsis --yes --no-progress

      - name: Install release tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit@${{ env.CARGO_EDIT_VERSION }},cargo-packager@${{ env.CARGO_PACKAGER_VERSION }}

      - name: Set release version
        run: cargo set-version --workspace "${{ needs.plan.outputs.version }}"

      - name: Build application
        run: cargo build -p saymore-desktop --release

      - name: Package NSIS installer
        run: >-
          cargo packager --release --packages saymore-desktop --formats nsis
          --binaries-dir target/release --out-dir dist

      - name: Use user-facing installer name
        shell: pwsh
        run: |
          $installer = Get-ChildItem apps\desktop\dist\saymore-desktop_*_*-setup.exe -File -ErrorAction Stop
          if ($installer.Count -ne 1) {
            throw "Expected exactly one Saymore NSIS installer, found $($installer.Count)"
          }
          Move-Item -LiteralPath $installer.FullName -Destination apps\desktop\dist\Saymore-Setup.exe

      - uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: apps/desktop/dist/*.exe
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [plan, package-macos, package-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.plan.outputs.source-sha }}
          fetch-depth: 0

      - name: Install release tool
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-edit@${{ env.CARGO_EDIT_VERSION }}

      - name: Prepare release version
        env:
          VERSION: ${{ needs.plan.outputs.version }}
        run: |
          cargo set-version --workspace "$VERSION"
          cargo metadata --format-version=1 --no-deps > /dev/null

      - name: Commit version and create tag
        shell: bash
        env:
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch origin --tags
          if ! git rev-parse --verify --quiet "refs/tags/$TAG"; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock
            if ! git diff --cached --quiet; then
              git commit -m "chore(release): $TAG"
            fi
            git tag --annotate "$TAG" --message "Saymore $TAG"
            git push --atomic origin HEAD:main "$TAG"
          fi

      - uses: actions/download-artifact@v8
        with:
          name: release-macos
          path: dist

      - uses: actions/download-artifact@v8
        with:
          name: release-windows
          path: dist

      - name: Generate checksums
        working-directory: dist
        run: sha256sum ./* > SHA256SUMS

      - name: Create or repair GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --verify-tag \
              --generate-notes \
              --latest \
              --title "Saymore $TAG"
          fi
